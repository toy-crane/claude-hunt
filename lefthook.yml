pre-commit:
  jobs:
    - name: ultracite
      glob: "*.{js,jsx,ts,tsx,mjs,mts,cjs,cts,json,jsonc,css}"
      run: bunx ultracite fix {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: "*.{ts,tsx,mts,cts}"
      run: bun run typecheck

pre-push:
  jobs:
    - name: test
      run: bun run test:unit
