product:
  name: "Todo App"
  description: "A simple todo management app"

# FSD layer grouping:
#   entities / features / widgets / pages / shared / db
# ID format: {L}-{SLICE}-{NNN}, where L ∈ {E, F, W, P, S, DB}
# Slice name matches the folder name exactly.

entities:
  - id: todo
    title: "Todo — card rendering"
    scenarios:
      - id: E-TODO-001
        given: "A todo item with title 'Buy milk' and done=true"
        when: "The card renders"
        then: "The title 'Buy milk' is displayed with a strikethrough style"
        examples:
          - input: { title: "Buy milk", done: true }
            expect: { titleText: "Buy milk", style: "line-through" }
          - input: { title: "Buy milk", done: false }
            expect: { titleText: "Buy milk", style: "none" }

features:
  - id: add-todo
    title: "Add a todo"
    scenarios:
      - id: F-ADD-TODO-001
        given: "An empty todo list"
        when: "Type 'Buy milk' into the title field and click the 'Add' button"
        then: "A 'Buy milk' item appears in the list"
        examples:
          - input: { title: "Buy milk" }
            expect: { itemText: "Buy milk", itemCount: 1 }
      - id: F-ADD-TODO-002
        given: "The add-todo form with the title field empty"
        when: "Click the 'Add' button"
        then: "A 'Please enter a title' error message is displayed"
        examples:
          - input: { title: "" }
            expect: { errorMessage: "Please enter a title" }
    excludes:
      - "Todo category classification"
      - "Due-date setting"

  - id: delete-todo
    title: "Delete a todo"
    scenarios:
      - id: F-DELETE-TODO-001
        given: "A list displaying 3 todos"
        when: "Click the 'Delete' button on the first item"
        then: "The list displays 2 todos"
        examples:
          - input: { targetIndex: 0 }
            expect: { itemCount: 2 }
    preconditions:
      - "Add-todo feature exists"

pages:
  - id: home
    title: "Home page — todo list composition"
    scenarios:
      - id: P-HOME-001
        given: "The home page with an empty todo list"
        when: "The page loads"
        then: "'No todos yet' message and the 'Add a todo' form are displayed"
        examples:
          - input: { todoCount: 0 }
            expect: { emptyMessage: "No todos yet", addForm: true }

shared:
  - id: keyboard-shortcuts
    title: "Global keyboard shortcuts"
    scenarios:
      - id: S-KEYBOARD-SHORTCUTS-001
        given: "Any page with focus not on an input field"
        when: "Press the 'n' key"
        then: "The add-todo form gets focus"
        examples:
          - input: { key: "n", focus: "body" }
            expect: { formFocused: true }

db:
  - id: todos
    title: "Todos table — RLS"
    scenarios:
      - id: DB-TODOS-001
        given: "An authenticated user with their own todos"
        when: "Query the todos table"
        then: "Only the user's own todos are returned"
        examples:
          - input: { queryAs: "authenticated_user" }
            expect: { rowCount: 3 }
          - input: { queryAs: "authenticated_user", filterBy: "other_user_id" }
            expect: { rowCount: 0 }
    preconditions:
      - "Supabase with todos table and RLS policies"
